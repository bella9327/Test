<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易家庭預算管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px; }
        .balance-val { font-size: 2.5rem; font-weight: bold; }
        .btn-custom { border-radius: 10px; padding: 10px 20px; }
        .history-list { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <div class="container">
        <h1>🏠 家庭財務管理</h1>
        <p>掌握每一分錢的流向</p>
        <div class="mt-4">
            <span class="opacity-75">總資產：</span>
            <div class="balance-val" id="totalBalance">$ 0.00</div>
        </div>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title mb-3">💰 戶口儲蓄</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="accName" class="form-control" placeholder="戶口名稱 (如: 現金)">
                        <input type="number" id="accAmount" class="form-control" placeholder="金額">
                        <button class="btn btn-success" onclick="addSavings()">存入</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h5 class="card-title mb-3">💸 記錄開支</h5>
                    <div class="mb-3">
                        <label class="form-label">選擇戶口</label>
                        <select id="expenseAcc" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">開支類別</label>
                        <input type="text" id="expenseCat" class="form-control" placeholder="如: 買餸、交通">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">金額</label>
                        <input type="number" id="expenseAmount" class="form-control" placeholder="0.00">
                    </div>
                    <button class="btn btn-danger w-100 btn-custom" onclick="addExpense()">確認扣除</button>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title mb-3">📊 戶口清單</h5>
                    <div id="accountsList" class="row">
                        </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h5 class="card-title mb-3">🕒 最近交易</h5>
                    <div class="history-list">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>時間</th>
                                    <th>戶口</th>
                                    <th>類別</th>
                                    <th>金額</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody">
                                </tbody>
                        </table>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary mt-2" onclick="clearAllData()">重設所有資料</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 資料結構
    let budgetData = {
        accounts: {}, // { "現金": 1000 }
        history: []   // [ {time, acc, cat, amount} ]
    };

    // 初始化：從 LocalStorage 讀取
    function init() {
        const savedData = localStorage.getItem('familyBudgetData');
        if (savedData) {
            budgetData = JSON.parse(savedData);
        }
        updateUI();
    }

    // 儲存資料
    function saveData() {
        localStorage.setItem('familyBudgetData', JSON.stringify(budgetData));
        updateUI();
    }

    // 更新介面
    function updateUI() {
        // 1. 更新總資產
        let total = 0;
        const accListDiv = document.getElementById('accountsList');
        const accSelect = document.getElementById('expenseAcc');
        accListDiv.innerHTML = '';
        accSelect.innerHTML = '<option value="">-- 請選擇 --</option>';

        for (let name in budgetData.accounts) {
            let bal = budgetData.accounts[name];
            total += bal;

            // 更新戶口卡片
            accListDiv.innerHTML += `
                <div class="col-6 mb-2">
                    <div class="p-3 border rounded bg-white">
                        <small class="text-muted">${name}</small>
                        <div class="fw-bold">$ ${bal.toLocaleString()}</div>
                    </div>
                </div>
            `;

            // 更新下拉選單
            accSelect.innerHTML += `<option value="${name}">${name}</option>`;
        }
        document.getElementById('totalBalance').innerText = `$ ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

        // 2. 更新歷史表格
        const historyBody = document.getElementById('historyBody');
        historyBody.innerHTML = '';
        budgetData.history.slice(0, 10).forEach(item => {
            historyBody.innerHTML += `
                <tr>
                    <td><small>${item.time}</small></td>
                    <td>${item.acc}</td>
                    <td>${item.cat}</td>
                    <td class="text-danger">-$${item.amount}</td>
                </tr>
            `;
        });
    }

    // 功能：新增儲蓄
    function addSavings() {
        const name = document.getElementById('accName').value.trim();
        const amount = parseFloat(document.getElementById('accAmount').value);

        if (!name || isNaN(amount)) return alert("請輸入完整名稱與金額");

        budgetData.accounts[name] = (budgetData.accounts[name] || 0) + amount;
        
        // 清空輸入框
        document.getElementById('accName').value = '';
        document.getElementById('accAmount').value = '';
        saveData();
    }

    // 功能：新增開支
    function addExpense() {
        const acc = document.getElementById('expenseAcc').value;
        const cat = document.getElementById('expenseCat').value.trim();
        const amount = parseFloat(document.getElementById('expenseAmount').value);

        if (!acc || !cat || isNaN(amount)) return alert("請填寫完整開支資料");
        if (budgetData.accounts[acc] < amount) {
            if (!confirm("戶口餘額不足，確定要繼續扣款嗎？")) return;
        }

        // 扣款
        budgetData.accounts[acc] -= amount;

        // 紀錄
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
        budgetData.history.unshift({
            time: timeStr,
            acc: acc,
            cat: cat,
            amount: amount
        });

        // 清空輸入
        document.getElementById('expenseCat').value = '';
        document.getElementById('expenseAmount').value = '';
        saveData();
    }

    // 重設
    function clearAllData() {
        if (confirm("確定要刪除所有紀錄嗎？這無法還原！")) {
            localStorage.removeItem('familyBudgetData');
            budgetData = { accounts: {}, history: [] };
            updateUI();
        }
    }

    // 啟動
    init();
</script>

</body>
</html>
